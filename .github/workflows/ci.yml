name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Cache node_modules at workspace root
      - name: Cache workspace node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            */node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json', '**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install dependencies at workspace root
      - name: Install workspace dependencies
        run: npm ci

      # Build bim-fragment-viewer
      - name: Build bim-fragment-viewer
        run: |
          cd bim-fragment-viewer
          npm ci
          npm run build

      # Build mobile viewer
      - name: Build mobile viewer
        run: |
          cd projects/bim-mobile-viewer
          pnpm install
          pnpm run build

      # Install pnpm for mobile viewer
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      # Run unit tests
      - name: Run unit tests
        run: npx vitest run

      # Run smoke tests (with allow-failure flag)
      - name: Start server for smoke tests
        run: node scripts/serve-dist.js 8080 bim-fragment-viewer/dist &
        
      - name: Wait for server
        run: sleep 3
        
      - name: Run smoke tests
        run: node scripts/smoke-test.js
        env:
          SMOKE_URL: http://localhost:8080
        continue-on-error: true

      # Upload test results
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results/
            coverage/
