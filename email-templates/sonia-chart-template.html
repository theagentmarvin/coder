<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart Ready</title>
</head>
<body style="margin:0; padding:20px; background-color:#f9fafb; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" max-width="480" cellpadding="0" cellspacing="0" border="0" style="max-width:480px; background-color:#ffffff; border-radius:12px; padding:32px; box-shadow:0 2px 8px rgba(0,0,0,0.06);">
          <!-- Header -->
          <tr>
            <td style="padding-bottom:20px;">
              <p style="margin:0; font-size:16px; color:#374151; line-height:1.6;">Hey Sonia!</p>
            </td>
          </tr>
          
          <!-- Body -->
          <tr>
            <td style="padding-bottom:24px;">
              <p style="margin:0 0 16px 0; font-size:15px; color:#4b5563; line-height:1.6;">
                Here's the chart we were working on — Ricardo helped me pull the data together.
              </p>
              <p style="margin:0; font-size:15px; color:#4b5563; line-height:1.6;">
                {{VIZ_DESCRIPTION}}
              </p>
            </td>
          </tr>
          
          <!-- CTA Button -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="border-radius:8px; background-color:#16a34a;">
                    <a href="{{VIZ_URL}}" target="_blank" style="display:inline-block; padding:16px 32px; font-size:16px; font-weight:600; color:#ffffff; text-decoration:none; border-radius:8px;">
                      📊 Open Chart
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          
          <!-- Signoff -->
          <tr>
            <td style="border-top:1px solid #e5e7eb; padding-top:20px;">
              <p style="margin:0; font-size:14px; color:#6b7280; line-height:1.5;">
                Cheers,<br>
                Marvin 🛎️
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
